<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentGPE</title>
    <link href="{% static 'css/index.css' %}" rel="stylesheet">
    <script src="{% static 'js/index.js' %}"></script>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'imgs/agentlogo.png' %}">
</head>
<body>
    <div class="header compact">
        <h1 id="title">Agent GPE</h1>
        <button id="settings-btn" onclick="toggleSettings()">⚙️ Settings</button>
    </div>

    <div id="settings-panel">
        <div class="settings-grid">
            <label for="server-host">Server Host:</label>
            <input type="text" id="server-host" value="localhost">

            <label for="server-port">Server Port:</label>
            <input type="number" id="server-port" value="3000" min="1" max="65535">

            <label for="use-secure">Use Secure Connection:</label>
            <input type="checkbox" id="use-secure">

            <label for="dark-mode">Dark Mode:</label>
            <div class="theme-switch">
                <input type="checkbox" id="dark-mode" class="theme-switch-checkbox">
                <label for="dark-mode" class="theme-switch-label"></label>
            </div>
        </div>
        <button id="save-settings" class="save-btn" onclick="saveAndApplySettings()">Save Settings</button>
    </div>

    <div class="flex-container">
        <div id="chat-container"></div>
        <div id="progress-container">
            <h3>Processing Steps</h3>
            <div id="progress-log"></div>
        </div>
    </div>

    <div id="input-container" class="centered">
        <textarea id="user-input" rows="3" placeholder="How can I help you today?"></textarea>
        <!-- In index.html, replace the send button with this (removing the onclick attribute): -->
<button id="send-button">Send</button>

<!-- Then replace the script at the bottom of index.html with this simplified version: -->
    </div>


    <div id="status-bar">
        <div id="status">Disconnected</div>
        <div class="buttons-container">
            <button id="clear-progress">Clear Progress</button>
            <button id="clear-chat">Clear Chat</button>
        </div>
    </div>
        <!-- Files section HTML template -->
    <div id="files-container" class="files-section">
        <h3>Generated Files</h3>
        <div id="files-list" class="files-list">
            <div class="no-files">No files generated yet</div>
        </div>
    </div>
</body>

<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log("Initializing enhanced button handler");
    const sendButton = document.getElementById('send-button');
    const userInput = document.getElementById('user-input');

    if (sendButton) {
        // Remove any existing onclick attribute
        sendButton.removeAttribute('onclick');

        // Clear any existing listeners (important cleanup)
        const newButton = sendButton.cloneNode(true);
        sendButton.parentNode.replaceChild(newButton, sendButton);

        // Add our single, robust handler
        newButton.addEventListener('click', function() {
            console.log("Send button clicked - enhanced handler");

            const message = userInput.value.trim();
            if (!message) {
                console.log("Empty message, not sending");
                return;
            }

            console.log("Message content:", message);

            // Check connection state
            if (typeof isConnected !== 'undefined') {
                console.log("Connection state:", isConnected ? "Connected" : "Disconnected");
            } else {
                console.log("Warning: isConnected variable not accessible");
            }

            // Direct approach - bypass the window.sendMessage to avoid scope issues
            try {
                // Get first message state
                const isFirstMessage = (typeof firstMessageSent !== 'undefined') ? !firstMessageSent : true;
                console.log("Is first message:", isFirstMessage);

                if (isFirstMessage) {
                    // For first message, we need to ensure UI transition
                    console.log("Handling first message with UI transition");

                    // Force show full UI
                    if (typeof showFullUI === 'function') {
                        showFullUI();
                    } else {
                        console.log("Warning: showFullUI function not accessible");
                        // Manual fallback
                        document.querySelector('.flex-container').classList.add('visible');
                        document.getElementById('status-bar').classList.add('visible');
                        document.getElementById('settings-btn').classList.add('visible');
                        document.querySelector('.header').classList.remove('compact');
                        document.getElementById('input-container').classList.remove('centered');
                    }

                    // Use direct DOM access to display message
                    setTimeout(() => {
                        // Add message to UI
                        const chatContainer = document.getElementById('chat-container');
                        const messageDiv = document.createElement('div');
                        messageDiv.className = 'user-message';
                        messageDiv.textContent = message;
                        chatContainer.appendChild(messageDiv);

                        // Send via WebSocket if accessible
                        const socket = window.socket;
                        if (socket && socket.readyState === 1) {
                            console.log("Sending via WebSocket");
                            socket.send(JSON.stringify({
                                request: message,
                                clientId: localStorage.getItem('openManusClientId') || 'unknown'
                            }));
                        } else {
                            console.log("Socket not available or not connected");
                            // Show error in chat
                            const errorDiv = document.createElement('div');
                            errorDiv.className = 'agent-message';
                            errorDiv.textContent = "Connection error: Not connected to server. Your message was not sent.";
                            chatContainer.appendChild(errorDiv);
                        }

                        // Clear input
                        userInput.value = '';

                        // Auto-scroll chat
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }, 600);
                } else {
                    console.log("Handling subsequent message");

                    // For subsequent messages, simpler logic
                    // Add message to UI immediately
                    const chatContainer = document.getElementById('chat-container');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'user-message';
                    messageDiv.textContent = message;
                    chatContainer.appendChild(messageDiv);

                    // Send via WebSocket if accessible
                    const socket = window.socket;
                    if (socket && socket.readyState === 1) {
                        console.log("Sending via WebSocket");
                        socket.send(JSON.stringify({
                            request: message,
                            clientId: localStorage.getItem('openManusClientId') || 'unknown'
                        }));
                    } else {
                        console.log("Socket not available or not connected");
                        // Show error in chat
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'agent-message';
                        errorDiv.textContent = "Connection error: Not connected to server. Your message was not sent.";
                        chatContainer.appendChild(errorDiv);
                    }

                    // Clear input
                    userInput.value = '';

                    // Auto-scroll chat
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                // Update first message state
                if (typeof firstMessageSent !== 'undefined' && !firstMessageSent) {
                    firstMessageSent = true;
                    console.log("Updated firstMessageSent =", firstMessageSent);
                }

            } catch (error) {
                console.error("Error in send button handler:", error);
                alert("There was an error sending your message. Please check the console for details.");
            }
        });

        console.log("Enhanced button handler attached successfully");
    } else {
        console.error("Send button not found in the DOM");
    }
});
</script>
</html>
